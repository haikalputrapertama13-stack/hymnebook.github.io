<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymne | Author of Azelia Sang Figuran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: sans-serif; }
        .hero-gradient { background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); }
        .card { background: #161616; border: 1px solid #262626; border-radius: 12px; }
        .accent-text { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col items-center px-6 py-12">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold tracking-tighter mb-2">HYMNE<span class="accent-text">.</span></h1>
            <p class="text-gray-400 uppercase tracking-widest text-sm">Creative Writer & Novelist</p>
        </header>

        <div class="card w-full max-w-md p-6 mb-8">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-blue-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Current Project</span>
                <span class="text-gray-500 text-xs italic">Chapter 34+</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Azelia Sang Figuran</h2>
            <p class="text-gray-400 text-sm mb-4 leading-relaxed">
                Kisah transmigrasi medis dengan alur penuh intrik dan karakter "barbar" yang mendobrak hierarki sosial.
            </p>
            <a href="https://fizzo.org" class="block text-center bg-white text-black font-bold py-2 rounded-lg hover:bg-gray-200 transition">
                Baca di Fizzo
            </a>
        </div>

        <div class="grid grid-cols-2 gap-4 w-full max-w-md">
            <div class="card p-4 text-center">
                <p class="text-xs text-gray-500 uppercase mb-1">Status</p>
                <p class="font-bold">Contracted</p>
            </div>
            <div class="card p-4 text-center">
                <p class="text-xs text-gray-500 uppercase mb-1">Platform</p>
                <p class="font-bold">Fizzo Novel</p>
            </div>
        </div>

        <footer class="mt-auto pt-12 text-gray-600 text-xs text-center">
            &copy; 2026 Hymne Studio. All rights reserved.
        </footer>
    </div>
</body>
</html>
