<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymne | Author of Azelia Sang Figuran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.framerMotion;

        function App() {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen selection:bg-blue-500/30">
                    {/* Navigation */}
                    <nav className="fixed top-6 left-1/2 -translate-x-1/2 z-50">
                        <div className="glass px-2 py-2 rounded-full flex items-center gap-1 shadow-2xl">
                            <button onClick={() => setTab('home')} className={`px-5 py-2 rounded-full text-sm font-bold transition ${tab === 'home' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/40' : 'text-zinc-400 hover:text-white'}`}>Home</button>
                            <button onClick={() => setTab('characters')} className={`px-5 py-2 rounded-full text-sm font-bold transition ${tab === 'characters' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/40' : 'text-zinc-400 hover:text-white'}`}>Characters</button>
                        </div>
                    </nav>

                    <main className="pt-32 pb-20 container mx-auto px-6 max-w-5xl">
                        <AnimatePresence mode="wait">
                            {tab === 'home' ? (
                                <motion.section 
                                    key="home"
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                    className="space-y-12"
                                >
                                    {/* Hero Section */}
                                    <div className="text-center space-y-4">
                                        <motion.span initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.2 }} className="text-blue-500 font-bold tracking-widest text-xs uppercase">Official Author Portfolio</motion.span>
                                        <h1 className="text-6xl md:text-8xl font-extrabold tracking-tighter italic">HYMNE.</h1>
                                        <p className="text-zinc-400 max-w-xl mx-auto text-lg">Membangun semesta melalui kata-kata. Kreator dari seri novel fantasi medis.</p>
                                    </div>

                                    {/* Novel Spotlight */}
                                    <div className="glass p-8 rounded-[2.5rem] relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/10 blur-[100px] group-hover:bg-blue-600/20 transition duration-700"></div>
                                        <div className="flex flex-col md:flex-row gap-10 items-center">
                                            <div className="w-full md:w-1/3 aspect-[3/4] bg-gradient-to-br from-zinc-800 to-zinc-950 rounded-2xl border border-zinc-700 shadow-2xl flex items-center justify-center text-zinc-700 font-bold italic">Cover Book Area</div>
                                            <div className="flex-1 space-y-6">
                                                <h2 className="text-4xl font-bold italic">Azelia Sang Figuran</h2>
                                                <div className="flex gap-2">
                                                    <span className="bg-blue-500/10 text-blue-400 text-[10px] px-3 py-1 rounded-full border border-blue-500/20 uppercase font-bold">Transmigration</span>
                                                    <span className="bg-purple-500/10 text-purple-400 text-[10px] px-3 py-1 rounded-full border border-purple-500/20 uppercase font-bold">Medical Fantasy</span>
                                                </div>
                                                <p className="text-zinc-400 leading-relaxed">Terjebak dalam tubuh pemeran figuran di dunia novel buatannya sendiri. Azelia harus bertahan hidup di tengah intrik kerajaan dengan kecerdasan medis modern.</p>
                                                <div className="pt-4 flex flex-wrap gap-4">
                                                    <a href="#" className="bg-white text-black px-8 py-3 rounded-xl font-bold hover:scale-105 transition active:scale-95">Read on Fizzo</a>
                                                    <a href="#" className="glass px-8 py-3 rounded-xl font-bold hover:bg-zinc-800 transition border-zinc-700">Buy E-Book</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </motion.section>
                            ) : (
                                <motion.section 
                                    key="characters"
                                    initial={{ opacity: 0, scale: 0.95 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.95 }}
                                    className="grid md:grid-cols-2 gap-6"
                                >
                                    {/* Char Card 1 */}
                                    <div className="glass p-6 rounded-3xl group hover:border-blue-500/50 transition-colors duration-500">
                                        <div className="h-72 mb-6 rounded-2xl bg-zinc-800 overflow-hidden relative">
                                            <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 to-transparent"></div>
                                            <div className="absolute bottom-4 left-4">
                                                <h3 className="text-2xl font-bold">Azelia</h3>
                                                <p className="text-blue-400 text-sm">The Strategic Protagonist</p>
                                            </div>
                                        </div>
                                        <p className="text-zinc-400 text-sm italic">"Aku tidak butuh peran utama untuk mengendalikan alur cerita ini."</p>
                                    </div>

                                    {/* Char Card 2 */}
                                    <div className="glass p-6 rounded-3xl group hover:border-purple-500/50 transition-colors duration-500">
                                        <div className="h-72 mb-6 rounded-2xl bg-zinc-800 overflow-hidden relative">
                                            <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 to-transparent"></div>
                                            <div className="absolute bottom-4 left-4">
                                                <h3 className="text-2xl font-bold">Arsen</h3>
                                                <p className="text-purple-400 text-sm">The Cold Commander</p>
                                            </div>
                                        </div>
                                        <p className="text-zinc-400 text-sm italic">"Tatap mataku dan katakan kalau kau benar-benar hanya seorang figuran."</p>
                                    </div>
                                </motion.section>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="py-10 border-t border-zinc-900 text-center text-zinc-600 text-xs tracking-widest">
                        © 2026 HYMNE_BOOK. BUILT WITH REACT & TAILWIND.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
